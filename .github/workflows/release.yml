name: 🚀 Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.21'

jobs:
  build-and-release:
    name: 🏗️ Build and Release
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐹 Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: 📥 Install dependencies
      run: go mod download

    - name: 🧪 Run tests
      run: make test

    - name: 🏗️ Build binaries
      run: |
        # Build for multiple platforms
        GOOS=linux GOARCH=amd64 go build -o bin/api-linux-amd64 ./cmd/api
        GOOS=linux GOARCH=amd64 go build -o bin/worker-linux-amd64 ./cmd/worker
        GOOS=windows GOARCH=amd64 go build -o bin/api-windows-amd64.exe ./cmd/api
        GOOS=windows GOARCH=amd64 go build -o bin/worker-windows-amd64.exe ./cmd/worker
        GOOS=darwin GOARCH=amd64 go build -o bin/api-darwin-amd64 ./cmd/api
        GOOS=darwin GOARCH=amd64 go build -o bin/worker-darwin-amd64 ./cmd/worker

    - name: 📦 Create release packages
      run: |
        # Create packages for each platform
        tar -czf order-processor-linux-amd64.tar.gz -C bin api-linux-amd64 worker-linux-amd64
        zip order-processor-windows-amd64.zip bin/api-windows-amd64.exe bin/worker-windows-amd64.exe
        tar -czf order-processor-darwin-amd64.tar.gz -C bin api-darwin-amd64 worker-darwin-amd64

    - name: 📝 Generate changelog
      id: changelog
      run: |
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        git log $(git describe --tags --abbrev=0 HEAD~1)..HEAD --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: 🚀 Create Release
      uses: actions/create-release@v1
      id: create_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          ## Sistema Procesador de Órdenes Asíncrono
          
          ### 🎉 Release Notes
          
          ${{ steps.changelog.outputs.CHANGELOG }}
          
          ### 📦 Assets
          
          - `order-processor-linux-amd64.tar.gz` - Linux AMD64
          - `order-processor-windows-amd64.zip` - Windows AMD64  
          - `order-processor-darwin-amd64.tar.gz` - macOS AMD64
          
          ### 🚀 Quick Start
          
          1. Download the appropriate package for your platform
          2. Extract the archive
          3. Configure your `config.yaml`
          4. Run the API server: `./api`
          5. Run the worker: `./worker`
          
          ### 📚 Documentation
          
          - [Installation Guide](./docs/INSTALLATION.md)
          - [Configuration Guide](./docs/CONFIGURATION.md)
          - [API Documentation](./docs/swagger/index.html)
        draft: false
        prerelease: false

    - name: 📤 Upload Linux Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./order-processor-linux-amd64.tar.gz
        asset_name: order-processor-linux-amd64.tar.gz
        asset_content_type: application/gzip

    - name: 📤 Upload Windows Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./order-processor-windows-amd64.zip
        asset_name: order-processor-windows-amd64.zip
        asset_content_type: application/zip

    - name: 📤 Upload macOS Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./order-processor-darwin-amd64.tar.gz
        asset_name: order-processor-darwin-amd64.tar.gz
        asset_content_type: application/gzip

  docker:
    name: 🐳 Docker Build and Push
    runs-on: ubuntu-latest
    needs: build-and-release
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔑 Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 🏷️ Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          arielrighi/order-processor-api
          arielrighi/order-processor-worker
        tags: |
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: 🐳 Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./build/docker/Dockerfile.api
        push: true
        tags: arielrighi/order-processor-api:${{ github.ref_name }},arielrighi/order-processor-api:latest
        platforms: linux/amd64,linux/arm64

    - name: 🐳 Build and push Worker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./build/docker/Dockerfile.worker
        push: true
        tags: arielrighi/order-processor-worker:${{ github.ref_name }},arielrighi/order-processor-worker:latest
        platforms: linux/amd64,linux/arm64